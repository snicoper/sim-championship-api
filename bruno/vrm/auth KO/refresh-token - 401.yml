info:
  name: refresh-token - 401
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh-token"
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refreshToken}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        bru.setEnvVar('accessToken', data.accessToken)
        bru.setEnvVar('refreshToken', data.refreshToken)
    - type: tests
      code: |-
        const data = res.getBody();

        test("Should refresh-token unauthorized", () => {
          expect(res.getStatus()).to.equal(401);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
