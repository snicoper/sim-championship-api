info:
  name: forgot-password
  type: http
  seq: 8

http:
  method: POST
  url: "{{base-url}}/auth/forgot-password"
  body:
    type: json
    data: |-
      {
        "email": "alice@example.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        bru.setVar(
          'verificationToken',
          data.verificationToken,
        );
    - type: tests
      code: |-
        test("Should forgot password successfully", () => {
          expect(res.getStatus()).to.equal(201);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
