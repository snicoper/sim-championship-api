info:
  name: logout
  type: http
  seq: 6

http:
  method: POST
  url: "{{base-url}}/auth/logout"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar('accessToken', '')
        bru.setEnvVar('refreshToken', '')

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
