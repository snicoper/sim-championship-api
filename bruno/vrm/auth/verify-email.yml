info:
  name: verify-email
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url}}/auth/verify-email"
  body:
    type: json
    data: |-
      {
        "token": "{{verificationToken}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Should verify email successfully", () => {
          expect(res.getStatus()).to.equal(204);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
