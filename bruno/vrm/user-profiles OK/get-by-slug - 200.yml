http:
  method: GET
  url: "{{baseUrl}}/user-profiles/{{userProfileSlug}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const data = res.getBody();

        test("Should get-by-id successfully", () => {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should return user profile", () => {
          expect(data.id).to.be.a("string");
          expect(data.slug).to.equal(bru.getVar('userProfileSlug'));
        });

